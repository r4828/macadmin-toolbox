name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  license-headers:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check MIT attribution headers
        run: bash tools/check-license-headers.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
        env:
          # Skip sourced files ShellCheck cannot follow.
          SHELLCHECK_OPTS: -e SC1091

  markdownlint:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
