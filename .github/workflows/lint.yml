name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  license-headers:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check MIT attribution headers
        run: bash tools/check-license-headers.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          # ShellCheck has no zsh mode (SC1071); zsh scripts are covered by
          # the zsh-syntax job below.
          ignore_names: "*.zsh"
        env:
          # Skip sourced files ShellCheck cannot follow.
          SHELLCHECK_OPTS: -e SC1091

  zsh-syntax:
    name: zsh syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Syntax-check zsh scripts
        run: |
          status=0
          while IFS= read -r -d '' f; do
            echo "zsh -n $f"
            zsh -n "$f" || status=1
          done < <(find . -name '*.zsh' -type f -not -path './.git/*' -print0)
          exit "$status"

  markdownlint:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
